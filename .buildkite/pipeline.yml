# Boss/mono Buildkite CI pipeline.
#
# Shape:
#   bootstrap → [bazel-build, mac-app-build, checks] → [bazel-test]
#
# Each steps/*.sh script contains all logic; no inline shell here.
# Queue: linux-amd64 — Default cluster queue for Linux agents.
# Queue: macos-arm64 — Zakalwe-1 agent for macOS Swift targets.

steps:
  - label: ":boot: bootstrap"
    key: "bootstrap"
    command: ".buildkite/steps/bootstrap.sh"
    agents:
      queue: "linux-amd64"
    notify:
      - github_commit_status:
          context: "buildkite/mono/bootstrap"

  - label: ":bazel: bazel-build"
    key: "bazel-build"
    command: ".buildkite/steps/bazel-build.sh"
    depends_on: "bootstrap"
    artifact_paths:
      - "bazel-out/**/extra_action_outputs/**/*"
    agents:
      queue: "linux-amd64"
    notify:
      - github_commit_status:
          context: "buildkite/mono/bazel-build"

  - label: ":apple: mac-app-build"
    key: "mac-app-build"
    command: ".buildkite/steps/mac-app-build.sh"
    depends_on: "bootstrap"
    agents:
      queue: "macos-arm64"
    notify:
      - github_commit_status:
          context: "buildkite/mono/mac-app-build"

  - label: ":white_check_mark: checks"
    key: "checks"
    command: ".buildkite/steps/checks.sh"
    depends_on: "bootstrap"
    agents:
      queue: "linux-amd64"
    notify:
      - github_commit_status:
          context: "buildkite/mono/checks"

  - wait: ~
    continue_on_failure: false

  - label: ":bazel: bazel-test"
    key: "bazel-test"
    command: ".buildkite/steps/bazel-test.sh"
    artifact_paths:
      - "bazel-testlogs/**/test.log"
      - "bazel-testlogs/**/test.xml"
    agents:
      queue: "linux-amd64"
    notify:
      - github_commit_status:
          context: "buildkite/mono/bazel-test"

  # Post-merge only: build Boss.app with shake credentials embedded and
  # publish a GitHub Release tagged boss-v1.0.N.  Skipped on PR branches and
  # on merges that don't touch tools/boss/.
  # Credentials are read from Buildkite's secret store; see:
  #   tools/boss/docs/buildkite-shake-secrets-setup.md
  - label: ":rocket: boss-release"
    key: "boss-release"
    if: build.branch == "main"
    command: ".buildkite/steps/boss-release.sh"
    depends_on: "bazel-test"
    agents:
      queue: "macos-arm64"
    retry:
      automatic: false
    notify:
      - github_commit_status:
          context: "buildkite/mono/boss-release"
