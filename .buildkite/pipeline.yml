# Boss/mono Buildkite CI pipeline.
#
# Shape:
#   bootstrap → [cargo-check, bazel-build, pnpm-typecheck, checks] → [bazel-test, pnpm-test]
#
# Each steps/*.sh script contains all logic; no inline shell here.
# Queue: mono — agents shared with flunge, tagged separately.

steps:
  - label: ":boot: bootstrap"
    key: "bootstrap"
    command: ".buildkite/steps/bootstrap.sh"
    agents:
      queue: "mono"

  - label: ":rust: cargo-check"
    key: "cargo-check"
    command: ".buildkite/steps/cargo-check.sh"
    depends_on: "bootstrap"
    agents:
      queue: "mono"

  - label: ":bazel: bazel-build"
    key: "bazel-build"
    command: ".buildkite/steps/bazel-build.sh"
    depends_on: "bootstrap"
    agents:
      queue: "mono"

  - label: ":node: pnpm-typecheck"
    key: "pnpm-typecheck"
    command: ".buildkite/steps/pnpm-typecheck.sh"
    depends_on: "bootstrap"
    agents:
      queue: "mono"

  - label: ":white_check_mark: checks"
    key: "checks"
    command: ".buildkite/steps/checks.sh"
    depends_on: "bootstrap"
    agents:
      queue: "mono"

  - wait: ~
    continue_on_failure: false

  - label: ":bazel: bazel-test"
    key: "bazel-test"
    command: ".buildkite/steps/bazel-test.sh"
    agents:
      queue: "mono"

  - label: ":node: pnpm-test"
    key: "pnpm-test"
    command: ".buildkite/steps/pnpm-test.sh"
    soft_fail: true
    agents:
      queue: "mono"
