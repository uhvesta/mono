# Boss/mono Buildkite CI pipeline.
#
# Shape:
#   bootstrap → [bazel-build, checks] → [bazel-test]
#
# Each steps/*.sh script contains all logic; no inline shell here.
# Queue: linux-amd64 — Default cluster queue for Linux agents.

steps:
  - label: ":boot: bootstrap"
    key: "bootstrap"
    command: ".buildkite/steps/bootstrap.sh"
    agents:
      queue: "linux-amd64"

  - label: ":bazel: bazel-build"
    key: "bazel-build"
    command: ".buildkite/steps/bazel-build.sh"
    depends_on: "bootstrap"
    agents:
      queue: "linux-amd64"

  - label: ":white_check_mark: checks"
    key: "checks"
    command: ".buildkite/steps/checks.sh"
    depends_on: "bootstrap"
    agents:
      queue: "linux-amd64"

  - wait: ~
    continue_on_failure: false

  - label: ":bazel: bazel-test"
    key: "bazel-test"
    command: ".buildkite/steps/bazel-test.sh"
    agents:
      queue: "linux-amd64"
