[[checks]]
id = "rust-giant-structs-use-builder"

[checks.config]
builder = "bon"
# Grandfathered files containing structs with 6+ named fields and no bon::Builder.
# `exclude_files` skips the WHOLE file, so a new giant struct added to one of these
# files is never examined. Prefer `exclude_structs` (below) for ordinary grandfathering:
# it keeps the file in scope and exempts only the named legacy structs, so new
# violators are still caught. Migrate files off this list onto `exclude_structs`.
# TODO: Convert each listed struct to use bon::Builder and shrink both lists to empty.
# Paths are relative to this CHECKS.toml's directory (tools/boss/).
exclude_files = [
  "bossctl/src/main.rs",
  "cli/src/main.rs",
  "client/src/lib.rs",
  "engine/src/app.rs",
  "engine/src/audit.rs",
  "engine/src/completion.rs",
  "engine/src/coordinator.rs",
  "engine/src/dispatch_events.rs",
  "engine/src/dispatch_reader.rs",
  "engine/src/external_tracker/github.rs",
  "engine/src/external_tracker/mod.rs",
  "engine/src/external_tracker/reconcile.rs",
  "engine/src/host_adapter.rs",
  "engine/src/host_registry.rs",
  "engine/src/live_status_loop.rs",
  "engine/src/merge_poller.rs",
  "engine/src/settings.rs",
  "engine/src/spawn_flow.rs",
  "engine/src/work/audit_misc.rs",
  "engine/src/work/mappers.rs",
  "engine/src/worker_registry.rs",
  "engine/src/worker_setup.rs",
  "protocol/src/engine_app.rs",
  "protocol/src/live_status_debug.rs",
  "protocol/src/live_worker_state.rs",
  "protocol/src/wire.rs",
]
# Grandfathered struct NAMES. The file is still scanned, so any NEW giant struct added
# alongside these is flagged. `tools/boss/protocol/src/types.rs` was migrated here off
# `exclude_globs` so that new input/row types added to it (e.g. CreateAttentionInput)
# are caught. TODO: convert these to #[derive(bon::Builder)] and remove them.
#
# Entry forms:
#   "StructName"                   — simple name, scoped to this CHECKS.toml's subtree
#                                    (tools/boss/). A same-named struct elsewhere in the
#                                    repo is NOT exempted.
#   "relative/path.rs::StructName" — qualified, resolved relative to this file's directory.
#                                    Exempts that struct only in that exact file.
exclude_structs = [
  # tools/boss/protocol/src/types.rs
  "WorkItemExternalRef",
  "WorkRun",
  "WorkAttentionItem",
  "EffortEscalation",
  "EffortAuditMarkerRow",
  "EffortAuditReport",
  "ConflictResolution",
  "CiRemediation",
  "CiBudgetSnapshot",
  "EngineAttemptListEntry",
  "WorkTree",
  "CreateProductInput",
  "CreateProjectInput",
  "CreateTaskInput",
  "CreateChoreInput",
  "CreateInvestigationInput",
  "CreateRevisionInput",
  "CreateExecutionInput",
  "CreateRunInput",
  "CreateAttentionItemInput",
  "WorkItemPatch",
]

[checks.policy]
severity = "error"
allow_bypass = true
