[[checks]]
id = "rust-giant-structs-use-builder"

[checks.config]
builder = "bon"
# Grandfathered files containing structs with 6+ named fields and no bon::Builder.
# `exclude_files` skips the WHOLE file: any giant struct in a listed file — including
# ones added later — is never examined. That is the wrong tool for grandfathering
# existing violations, so this list is intentionally tiny. Prefer `exclude_structs`
# (below): the file stays in scope and only the named legacy structs are exempt, so a
# NEW giant struct in the same file is still flagged.
#
# Paths are relative to this CHECKS.toml's directory (tools/boss/).
#
# The sole remaining entry is `cli/src/main.rs`, whose giant structs are clap
# `#[derive(Parser/Args)]` command definitions. syn cannot tell those apart from
# ordinary structs yet, so the whole file stays excluded until the separate
# "clap args exempt by default" chore lands clap detection — at which point this
# `exclude_files` list should disappear entirely.
exclude_files = [
  "cli/src/main.rs",
]
# Grandfathered struct violations, scanned-but-exempt. The file is still parsed, so a
# NEW giant struct added alongside any of these is flagged (this is how the
# `CreateAttentionInput` miss — see T819 — is now caught). TODO: convert each to
# `#[derive(bon::Builder)]` and delete its entry.
#
# Entry forms:
#   "StructName"                   — simple name, scoped to this CHECKS.toml's subtree
#                                    (tools/boss/). A same-named struct elsewhere in the
#                                    repo is NOT exempted.
#   "relative/path.rs::StructName" — qualified, resolved relative to this file's directory
#                                    (tools/boss/). Exempts that struct only in that exact
#                                    file, so a same-named struct in another file is still
#                                    flagged. This is the form used by entries migrated off
#                                    `exclude_globs` (T828/T829): it exempts exactly the
#                                    known-existing violation and nothing more.
exclude_structs = [
  # tools/boss/protocol/src/types.rs (migrated from exclude_globs in T819/T828)
  "WorkItemExternalRef",
  "WorkRun",
  "WorkAttentionItem",
  "EffortEscalation",
  "EffortAuditMarkerRow",
  "EffortAuditReport",
  "ConflictResolution",
  "CiRemediation",
  "CiBudgetSnapshot",
  "EngineAttemptListEntry",
  "WorkTree",
  "CreateProjectInput",
  "CreateTaskInput",
  "CreateInvestigationInput",
  "CreateRunInput",
  "CreateAttentionItemInput",
  "WorkItemPatch",

  # Migrated off exclude_globs (qualified per-file form). Each line is the exact giant
  # struct that existed in that file when it was grandfathered; new giant structs in
  # these files are now flagged. host_adapter.rs, settings.rs, and worker_registry.rs
  # were dropped from exclude_globs without replacement — they have zero current
  # violations (the structs that earned the exclude have since been migrated/removed).
  "bossctl/src/main.rs::MetricRow",
  "client/src/lib.rs::Discovery",
  "engine/core/src/app.rs::ServerState",
  "engine/core/src/audit.rs::StartContext",
  "engine/core/src/completion.rs::ApiPr",
  "engine/core/src/completion.rs::WorkerCompletionHandler",
  "engine/core/src/coordinator.rs::CubeRepoSummary",
  "engine/core/src/coordinator.rs::ExecutionCoordinator",
  "engine/core/src/dispatch_events.rs::DispatchEvent",
  "engine/core/src/dispatch_reader.rs::GhostActiveEntry",
  "engine/core/src/dispatch_reader.rs::StalledStage",
  "engine/core/src/external_tracker/github.rs::GitHubConfig",
  "engine/core/src/external_tracker/mod.rs::UpstreamItem",
  "engine/core/src/host_registry.rs::Host",
  "engine/core/src/live_status_loop.rs::SlotDebugSnapshot",
  "engine/core/src/live_status_loop.rs::DispatcherStatsSnapshot",
  "engine/core/src/live_status_loop.rs::SlotConfig",
  "engine/core/src/merge_poller.rs::PrLifecycleProbe",
  "engine/core/src/merge_poller.rs::SweepOutcome",
  "engine/core/src/spawn_flow.rs::StartWorkerInput",
  "engine/core/src/work/audit_misc.rs::ProjectPropertyAuditEntry",
  "engine/core/src/work/mappers.rs::ConflictResolutionInsertInput",
  "engine/core/src/work/mappers.rs::CiRemediationInsertInput",
  "engine/core/src/worker_setup.rs::WorkerSetupInput",
  "protocol/src/engine_app.rs::SpawnWorkerPaneInput",
  "protocol/src/live_status_debug.rs::LiveStatusDebugReport",
  "protocol/src/live_status_debug.rs::DispatcherStatsReport",
  "protocol/src/live_status_debug.rs::LiveStatusSlotDebug",
  "protocol/src/live_worker_state.rs::LiveWorkerState",
  "protocol/src/wire.rs::WorkspacePoolEntry",
]

[checks.policy]
severity = "error"
allow_bypass = true
