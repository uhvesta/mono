checks:
  - id: no-usfa-typo
    enabled: false

# ── declarative bazel format/lint check notes ────────────────────────────────
#
# The format/bazel and lint/bazel checks are purely declarative (no built-in
# Rust code). In this repo (mono), the root CHECKS.yaml points at the on-disk
# definitions via check_definitions.exec_paths so changes to
# checks/format/bazel.yaml or checks/lint/bazel.yaml take effect immediately
# without recompiling the binary.
#
# In external repos, `- id: format/bazel` with no check_definitions section
# uses the bundled snapshot compiled into the checkleft binary (zero install).
# To use the always-head definition instead, add:
#
#   check_definitions:
#     exec_paths:
#       - tools/checkleft/checks   # or wherever the defs live
#     allow_override_bundled: true
