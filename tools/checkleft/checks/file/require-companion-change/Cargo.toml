[package]
name = "checkleft-file-require-companion-change"
version = "0.1.0"
edition.workspace = true
description = "checkleft check (file/require-companion-change): require a companion change when a coupled surface changes (LINT.IfChange / LINT.ThenChange markers or trigger_globs / required_globs)"

# An ordinary rlib. The component ABI is wired once in the aggregating
# `checkleft-preinstalled-bundle` crate (a cdylib), which links this check into
# the single multiplexed preinstalled component. No `wit-bindgen` dependency is
# needed here because this crate does not call `export_checks!`.
[dependencies]
checkleft-check-sdk = { path = "../../../sdk" }
serde = { workspace = true, features = ["derive"] }
globset = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
