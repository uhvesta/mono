id: format/bazel
mode: declarative
runtime: declarative-v1
api_version: v1
applies_to:
  - "**/BUILD"
  - "**/BUILD.bazel"
  - "**/*.bzl"
  - "**/*.star"
  - "**/WORKSPACE"
  - "**/WORKSPACE.bazel"
  - "**/MODULE.bazel"

needs:
  buildifier:
    default:
      bazel: "@buildifier_prebuilt//:buildifier"

invocations:
  - id: format
    run: buildifier
    mode: batch
    args:
      - "--mode=check"
      - "--format=json"
      - "{{files}}"
    exit:
      "0": findings
      default: error
    transform:
      kind: json
      select: ".files[] | select(.formatted == false)"
      finding:
        path: "{{item.filename}}"
        message: "file needs buildifier formatting"
        severity: warning
        remediations:
          - "Run `buildifier {{item.filename}}` to auto-format."
