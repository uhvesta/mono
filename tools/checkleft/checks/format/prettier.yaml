id: format/prettier
mode: declarative
runtime: declarative-v1
api_version: v1
applies_to:
  - "**/*.{js,jsx,mjs,cjs,ts,tsx,mts,cts,json,css,scss,less,html,vue,md,markdown,yaml,yml,graphql,gql}"
skip_symlinks: true

# Binary resolution + version pinning:
#   - default: the `npm` binding provisions Prettier via `npx --yes prettier@<version>`,
#     pinned here to 3.8.4. The version is part of the package spec, so npx fetches
#     and runs exactly that release regardless of any globally-installed copy — a
#     reproducible tool without standing up a parallel Bazel JS toolchain (mono has
#     no rules_js/node Bazel integration today; Node arrives on PATH via the planned
#     CI bootstrap). Re-pin per-repo via CHECKS config, setting only the version
#     (package is inherited from this default `npm` binding):
#
#       checks:
#         - id: format/prettier
#           config:
#             needs:
#               prettier:
#                 npm:
#                   version: "3.9.0"
#
#   - fallback: when `npx` is not on PATH (some local/non-CI environments), the
#     framework uses `prettier` from PATH and warns loudly on stderr so you know the
#     pinned toolchain was skipped. A repo that later adopts a hermetic Bazel JS
#     toolchain can point `needs.prettier.bazel` at its prettier target via CHECKS
#     config with no change to this definition.
#   - Prettier discovers the REPO's own config (.prettierrc / prettier.config.*) and
#     .prettierignore relative to the repo root (invocations run with cwd = repo
#     root). checkleft imposes no formatting options of its own.
needs:
  prettier:
    default:
      npm:
        package: "prettier"
        version: "3.8.4"
    fallback:
      path: "prettier"

invocations:
  - id: format
    run: prettier
    mode: batch
    args:
      # --list-different: print the path of each file NOT already formatted (one
      # per line) and exit non-zero. Batch mode runs one process over all files,
      # paying npx startup once. The linelist transform maps each printed path to
      # a per-file finding. This is CHECK mode — it never writes files.
      - "--list-different"
      # --ignore-unknown: silently skip a file Prettier has no parser for instead
      # of erroring, so an applies_to match Prettier can't handle is a no-op.
      - "--ignore-unknown"
      - "{{files}}"
    # Prettier exit codes in batch mode:
    #   0 = all files already formatted (ok)
    #   1 = at least one file needs formatting (unformatted paths on stdout)
    #   2 = at least one parse/syntax error (message on stderr); Prettier continues
    #       past the bad file and still reports unformatted paths on stdout.
    #       Mapped to `findings` so the linelist transform runs: files with
    #       unformatted output become findings; an all-error batch (empty stdout)
    #       causes the linelist to bail as an operational error.
    exit:
      "0": ok
      "1": findings
      "2": findings
      default: error
    transform:
      kind: linelist
      message: "file needs prettier formatting"
      remediations:
        - "Run `{{needs.prettier.invocation}} --write {{input.file}}` to auto-format."
    fix:
      # prettier --write rewrites each file in place and exits 0 on success.
      # Exit 2 (parse error) is a genuine failure — abort copy-back.
      # --ignore-unknown carried over so stray files are skipped rather than erroring.
      args:
        - "--write"
        - "--ignore-unknown"
        - "{{files}}"
      exit:
        "0": ok
        default: error
