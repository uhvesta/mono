[package]
name = "checkleft-rust-giant-structs"
version = "0.1.0"
edition.workspace = true
description = "checkleft check (rust/giant-structs): flag Rust structs with too many named fields that lack a builder derive"

# An ordinary rlib. The component ABI is wired once in the aggregating
# `checkleft-preinstalled-bundle` crate (a cdylib), which links this check into
# the single multiplexed preinstalled component. No `wit-bindgen` dependency is
# needed here because this crate no longer calls `export_checks!`.
#
# The lib name is set explicitly so cargo matches the Bazel `crate_name`
# (`checkleft_rust_giant_structs_use_builder`); the aggregator imports the check
# by this crate name under both build systems.
[lib]
name = "checkleft_rust_giant_structs_use_builder"

[dependencies]
checkleft-check-sdk = { path = "../../../sdk" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
syn = { workspace = true }
